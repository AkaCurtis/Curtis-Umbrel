name: Publish Container Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  # Results in ghcr.io/<owner>/<repo>, e.g. ghcr.io/getumbrel/umbrel
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push multi-arch container
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enable QEMU so Buildx can cross-compile arm64 images on the amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the built-in GITHUB_TOKEN ΓÇö no secrets needed
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags automatically:
      #   push to master/main  ΓåÆ :latest
      #   push tag v1.2.3      ΓåÆ :1.2.3, :1.2, :1
      #   pull request          ΓåÆ image built but NOT pushed
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.container
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse GitHub Actions cache between runs to speed up builds
          cache-from: type=gha,scope=container
          cache-to: type=gha,mode=max,scope=container
